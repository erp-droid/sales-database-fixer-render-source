    filter="url(#outer-shadow)"
  />

  <rect
    x="200"
    y="221"
    width="606"
    height="590"
    rx="138"
    fill="url(#inner)"
    stroke="#eceef1"
    stroke-width="5"
    filter="url(#inner-shadow)"
  />

  <g fill="#08b938">
    <path d="M238 594 L412 493 L503 582 L605 500 L773 594 Z" />
    <path d="M503 386 L580 430 L503 506 L432 430 Z" />
  </g>

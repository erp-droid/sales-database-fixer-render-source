services:
  - type: web
    name: sales-database-fixer
    runtime: docker
    repo: https://github.com/erp-droid/sales-database-fixer-business-accounts
    branch: main
    plan: starter
    region: ohio
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeploy: true
    numInstances: 1
    healthCheckPath: /api/healthz
    disk:
      name: sales-database-data
      mountPath: /app/data
      sizeGB: 5
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_PROVIDER
        value: acumatica
      - key: AUTH_COOKIE_NAME
        value: .ASPXAUTH
      - key: AUTH_COOKIE_SECURE
        value: "true"
      - key: AUTH_TOKEN_SECRET
        sync: false
      - key: APP_BASE_URL
        value: https://sales-database-fixer.onrender.com
      - key: MBQ_BASE_PATH
        value: /quotes
      - key: MBQ_INTEGRATED_AUTH_ENABLED
        value: "true"
      - key: MBQ_SIGNIN_PATH
        value: /signin
      - key: MBQ_GOOGLE_OAUTH_REDIRECT_URL
        value: https://sales-database-fixer.onrender.com/quotes/api/mail/oauth/callback
      - key: USER_CREDENTIALS_SECRET
        generateValue: true
      - key: ACUMATICA_BASE_URL
        value: https://meadowbrook.acumatica.com
      - key: ACUMATICA_ENTITY_PATH
        value: /entity/lightspeed/24.200.001
      - key: ACUMATICA_COMPANY
        value: MeadowBrook Live
      - key: ACUMATICA_BRANCH
        value: ""
      - key: ACUMATICA_LOCALE
        value: en-US

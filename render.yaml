        value: Opportunity
      - key: ACUMATICA_OPPORTUNITY_CLASS_DEFAULT
        value: PRODUCTION
      - key: ACUMATICA_OPPORTUNITY_CLASS_SERVICE
        value: SERVICE
      - key: ACUMATICA_OPPORTUNITY_CLASS_GLENDALE
        value: GLENDALE
